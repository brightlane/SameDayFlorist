# .github/workflows/enterprise.yml - FIXED VERSION
name: Enterprise 100K Blaster
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      batchSize:
        default: '5000'
jobs:
  blast:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # FIXED: Full history
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    
    - name: Install
      run: npm ci
    
    - name: Blast pages
      run: npm run blast-${{ github.event.inputs.batchSize || 5000 }}
    
    - name: Git config
      run: |
        git config user.name "Enterprise Blaster"
        git config user.email "bot@brightlane.com"
    
    - name: Pull latest
      run: git pull origin main --rebase  # FIXED: Sync remote
    
    - name: Commit batch
      run: |
        git add enterprise-batch-* sitemap-*.xml || true
        git commit -m "Enterprise batch ${{ github.event.inputs.batchSize || 5000 }} pages $(date)" || echo "No changes"
    
    - name: Push
      run: git push origin HEAD:main  # FIXED: Force sync
