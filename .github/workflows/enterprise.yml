name: Enterprise 100K Blaster

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  blast:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run 100K Blast
        run: npm run blast-100k

      - name: Commit changes safely
        run: |
          git config --global user.name "bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add .

          git commit -m "Enterprise blast update" || echo "No changes"

          # 🔥 CRITICAL FIX: sync before push
          git pull --rebase origin main || true

          git push origin main
